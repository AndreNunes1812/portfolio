spring:
  application:
    name: portfolio-backend
  datasource:
    url: jdbc:postgresql://localhost:5432/dbportfolio
    username: portfolio
    password: "portfolio2026"
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: public
    open-in-view: false
  flyway:
    baseline-on-migrate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha

logging:
  level:
    br.com.portfolio: INFO
    org.hibernate.SQL: WARN
